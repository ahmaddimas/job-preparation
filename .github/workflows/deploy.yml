name: Deploy to Vercel

# Only runs when a PR is merged into main (not on direct pushes)
on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    # Only run if the PR was actually merged (not just closed/rejected)
    # and the CI workflow passed for the same commit
    if: github.event.pull_request.merged == true
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Deploy to Vercel
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
